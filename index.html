<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orientation Tools Hub</title>
<link rel="icon" href="https://dehraflicks.com/wp-content/uploads/2025/07/car-icon-bg-png-dehraflicks.png" type="image/x-icon">
  
<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f4f6f8;
}

/* Header */
.header {
  background: #1f2937;
  color: white;
  padding: 15px;
  text-align: center;
  font-size: 20px;
}

/* Navigation */

.nav {
  display: flex;
  flex-wrap: wrap; /* allows buttons to move to next row */
  background: #374151;
  padding: 5px;
  gap: 5px;
  box-shadow: inset 0 -2px 4px rgba(0,0,0,0.2);
}

.nav button {
  flex: 1 1 calc(50% - 5px); /* 2 buttons per row */
  padding: 12px;
  border: 2px solid transparent;
  background: #4b5563;
  color: white;
  cursor: pointer;
  font-size: 15px;
  border-radius: 8px;
  transition: all 0.3s ease;
}


/* Hover effect */
.nav button:hover {
  background: #6b7280;
  border-color: #9ca3af;
}

/* Active tab */
.nav button.active {
  background: #2563eb;
  border: 2px solid #93c5fd;
  box-shadow: 0 0 8px rgba(37, 99, 235, 0.6);
}

/* Content area */
.container {
  position: relative;
  height: calc(100vh - 110px);
  overflow: hidden;
}

/* iFrames */
iframe {
  position: absolute;
  width: 100%;
  height: 100%;
  border: none;
  opacity: 0;
  transition: opacity 0.4s ease;
  pointer-events: none;
}

iframe.active {
  opacity: 1;
  pointer-events: auto;
}
</style>
</head>

<body>

<div class="header">
  🚗 Orientation Tools Hub
</div>

<div class="nav">
  <button class="active" onclick="showPage('state', this)">
    State Lookup
  </button>
  <button onclick="showPage('dealer', this)">
    Dealership Notes
  </button>
   <button onclick="showPage('VIN', this)">
    VIN Validator
  </button>
    <button onclick="showPage('DriveEasy', this)">
    Drive Easy Troubleshooting
  </button>
  </div>

<div class="container">
  <iframe id="dealer" src="https://jstaylor1984.github.io/Dealership/"></iframe>
  <iframe id="state" src="https://jstaylor1984.github.io/Testing/" class="active"></iframe>
  <iframe id="VIN" src="https://www.carfaxbig.com/vin-validator.cfx"></iframe>
  <iframe id="DriveEasy" src="https://apps.powerapps.com/play/e/d4ced920-723a-423f-8f9d-64344f5fdaa9/a/473488f2-9117-43d2-8e10-9470b0042104?tenantId=7389d8c0-3607-465c-a69f-7d4426502912&source=portal"></iframe>
</div>

<script>
function showPage(pageId, btn) {
  // Fade out all frames
  document.querySelectorAll("iframe").forEach(frame => {
    frame.classList.remove("active");
  });

  // Fade in selected
  document.getElementById(pageId).classList.add("active");

  // Update buttons
  document.querySelectorAll(".nav button").forEach(button => {
    button.classList.remove("active");
  });

  btn.classList.add("active");
}
</script>

<!-- Premium Calculator -->
<div id="premiumCalculator">
  <div class="calc-row">
    <label for="sixMonthPremium">6 Mo Premium</label>
    <input
      type="number"
      id="sixMonthPremium"
      oninput="calculateMonthlyPremium()"
      placeholder="0.00">
  </div>

  <div class="calc-row">
    <label for="monthlyPremium">Monthly</label>
    <input type="text" id="monthlyPremium" readonly>
  </div>
</div>

<style>
#premiumCalculator {
  position: fixed;
  bottom: 10px;
  left: 10px;
  z-index: 9999;
  background: white;
  border: 1px solid #ccc;
  border-radius: 8px;
  padding: 8px;
  box-shadow: 0 2px 8px rgba(0,0,0,.2);
  font-size: 12px;
  width: 220px;
}

#premiumCalculator .calc-row {
  display: flex;
  align-items: center;
  margin-bottom: 5px;
}

#premiumCalculator .calc-row:last-child {
  margin-bottom: 0;
}

#premiumCalculator label {
  width: 90px;
  font-weight: bold;
}

#premiumCalculator input {
  flex: 1;
  padding: 4px;
}
</style>

<script>
function calculateMonthlyPremium() {
  const sixMonthPremium =
    parseFloat(document.getElementById('sixMonthPremium').value);

  document.getElementById('monthlyPremium').value =
    !isNaN(sixMonthPremium)
      ? (sixMonthPremium / 6).toFixed(2)
      : '';
}
</script>

</body>
</html>
