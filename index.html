<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orientation Tools Hub!</title>
<link rel="icon" href="ata:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" type="image/x-icon">
  
<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f4f6f8;
}

/* Header */
.header {
  background: #1f2937;
  color: white;
  padding: 15px;
  text-align: center;
  font-size: 20px;
}

/* Navigation */
.nav {
  display: flex;
  background: #374151;
  padding: 5px;
  gap: 5px;
  box-shadow: inset 0 -2px 4px rgba(0,0,0,0.2);
}

.nav button {
  flex: 1;
  padding: 12px;
  border: 2px solid transparent;
  background: #4b5563;
  color: white;
  cursor: pointer;
  font-size: 15px;
  border-radius: 8px;
  transition: all 0.3s ease;
}

/* Hover effect */
.nav button:hover {
  background: #6b7280;
  border-color: #9ca3af;
}

/* Active tab */
.nav button.active {
  background: #2563eb;
  border: 2px solid #93c5fd;
  box-shadow: 0 0 8px rgba(37, 99, 235, 0.6);
}

/* Content area */
.container {
  position: relative;
  height: calc(100vh - 110px);
  overflow: hidden;
}

/* iFrames */
iframe {
  position: absolute;
  width: 100%;
  height: 100%;
  border: none;
  opacity: 0;
  transition: opacity 0.4s ease;
  pointer-events: none;
}

iframe.active {
  opacity: 1;
  pointer-events: auto;
}
</style>
</head>

<body>

<div class="header">
  🚗 Orientation Tools Hub!
</div>

<div class="nav">
  <button class="active" onclick="showPage('dealer', this)">
    Dealership Notes
  </button>
  <button onclick="showPage('state', this)">
    State Lookup
  </button>
  <button onclick="showPage('VIN', this)">
    VIN Validator
  </button>
</div>

<div class="container">
  <iframe id="dealer" src="https://jstaylor1984.github.io/Dealership/" class="active"></iframe>
  <iframe id="state" src="https://jstaylor1984.github.io/Testing/"></iframe>
  <iframe id="VIN" src="https://www.carfaxbig.com/vin-validator.cfx"></iframe>
</div>

<script>
function showPage(pageId, btn) {
  // Fade out all frames
  document.querySelectorAll("iframe").forEach(frame => {
    frame.classList.remove("active");
  });

  // Fade in selected
  document.getElementById(pageId).classList.add("active");

  // Update buttons
  document.querySelectorAll(".nav button").forEach(button => {
    button.classList.remove("active");
  });

  btn.classList.add("active");
}
</script>

</body>
</html>
