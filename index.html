<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orientation Tools Hub</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f4f6f8;
}

/* Header */
.header {
  background: #1f2937;
  color: white;
  padding: 15px;
  text-align: center;
  font-size: 20px;
}

/* Navigation */
.nav {
  display: flex;
  background: #374151;
}

.nav button {
  flex: 1;
  padding: 14px;
  border: none;
  background: #374151;
  color: white;
  cursor: pointer;
  font-size: 16px;
  transition: 0.2s;
}

.nav button:hover {
  background: #4b5563;
}

.nav button.active {
  background: #2563eb;
}

/* Content area */
.container {
  height: calc(100vh - 110px);
}

/* iFrames */
iframe {
  width: 100%;
  height: 100%;
  border: none;
  display: none;
}

iframe.active {
  display: block;
}
</style>
</head>

<body>

<div class="header">
  🚗 Orientation Tools Hub
</div>

<div class="nav">
  <button id="btnDealer" class="active" onclick="showPage('dealer', this)">
    Dealership Notes
  </button>
  <button id="btnState" onclick="showPage('state', this)">
    State Lookup
  </button>
  <button id="btnVin" onclick="showPage('VIN', this)">
    VIN Validator
  </button>
</div>

<div class="container">
  <iframe id="dealer" src="https://jstaylor1984.github.io/Dealership/" class="active"></iframe>
  <iframe id="state" src="https://jstaylor1984.github.io/Testing/"></iframe>
  <iframe id="VIN" src="https://www.carfaxbig.com/vin-validator.cfx"></iframe>
</div>

<script>
function showPage(pageId, btn) {
  // Hide all frames
  document.querySelectorAll("iframe").forEach(frame => {
    frame.classList.remove("active");
  });

  // Show selected frame
  document.getElementById(pageId).classList.add("active");

  // Remove active from all buttons
  document.querySelectorAll(".nav button").forEach(button => {
    button.classList.remove("active");
  });

  // Activate clicked button
  btn.classList.add("active");
}
</script>

</body>
</html>
